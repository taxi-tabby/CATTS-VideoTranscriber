name: Build

on:
  pull_request:
    branches:
      - main
    types: [closed]

permissions:
  contents: write

jobs:
  # ── 버전 결정 (공유) ──
  version:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get next version
        id: version
        run: |
          latest=$(git tag --list 'v[0-9]*' --sort=-version:refname | head -n1)
          if [ -z "$latest" ]; then
            next=1
          else
            num=${latest#v}
            next=$((num + 1))
          fi
          echo "tag=v${next}" >> "$GITHUB_OUTPUT"
          echo "Next version: v${next}"

  # ── Windows 빌드 ──
  build-windows:
    needs: version
    runs-on: windows-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject version
        shell: bash
        env:
          VER: ${{ needs.version.outputs.tag }}
        run: |
          NUM=${VER#v}
          sed -i "s/^version = .*/version = \"${NUM}\"/" pyproject.toml
          sed -i "s/^APP_VERSION = .*/APP_VERSION = ${NUM}/" src/main.py

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-lock.txt

      - name: Install PyTorch (CUDA 12.4)
        run: pip install torch torchaudio --index-url https://download.pytorch.org/whl/cu124

      - name: Install dependencies
        run: pip install -r requirements-lock.txt

      - name: Build with PyInstaller
        working-directory: build
        run: pyinstaller video_transcriber.spec --distpath output\dist --workpath output\build --clean -y
        env:
          WHISPER_MODEL_PATH: ""

      - name: Verify build (smoke test)
        shell: pwsh
        run: |
          $exe = "build\output\dist\VideoTranscriber\VideoTranscriber.exe"
          if (-not (Test-Path $exe)) {
            Write-Error "Build output not found: $exe"
            exit 1
          }
          $exeSize = [math]::Round((Get-Item $exe).Length / 1MB, 1)
          $totalSize = [math]::Round((Get-ChildItem -Recurse build\output\dist\VideoTranscriber | Measure-Object -Property Length -Sum).Sum / 1MB, 1)
          Write-Host "EXE: ${exeSize}MB, Total: ${totalSize}MB"

          # 파일 존재 확인
          $npCore = Get-ChildItem -Recurse build\output\dist\VideoTranscriber\_internal\numpy\_core -Filter "_multiarray_umath*.pyd" -ErrorAction SilentlyContinue
          if (-not $npCore) { Write-Error "numpy _multiarray_umath.pyd not found!"; exit 1 }
          Write-Host "numpy C-ext: $($npCore.Name)"

          $npLibs = "build\output\dist\VideoTranscriber\_internal\numpy.libs"
          if (-not (Test-Path $npLibs)) { Write-Error "numpy.libs/ not found!"; exit 1 }
          Get-ChildItem $npLibs -Filter "*.dll" | ForEach-Object { Write-Host "  $($_.Name)" }

          # 실제 exe 실행 테스트 (--selftest 모드)
          Write-Host "`n=== Running selftest ==="
          $proc = Start-Process -FilePath $exe -ArgumentList "--selftest" -Wait -PassThru -NoNewWindow
          $resultFile = "build\output\dist\VideoTranscriber\_selftest.txt"
          if (Test-Path $resultFile) {
            $content = Get-Content $resultFile -Raw
            Write-Host $content
            if ($content -notmatch "RESULT: PASS") {
              Write-Error "Selftest FAILED!"
              exit 1
            }
            Write-Host "`nSelftest PASSED"
          } else {
            Write-Error "Selftest result file not created! Exit code: $($proc.ExitCode)"
            exit 1
          }

      - name: Create portable zip
        shell: pwsh
        run: Compress-Archive -Path build\output\dist\VideoTranscriber\* -DestinationPath CATTS-${{ needs.version.outputs.tag }}-Portable-Windows-x64.zip

      - name: Build installer (Inno Setup)
        shell: pwsh
        run: |
          $version = "${{ needs.version.outputs.tag }}".TrimStart("v")
          $env:APP_VERSION = $version
          iscc build\installer.iss

      - name: Copy installer
        shell: pwsh
        run: |
          $version = "${{ needs.version.outputs.tag }}".TrimStart("v")
          Copy-Item "build\output\installer\CATTS-v${version}-Setup-Windows-x64.exe" .

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: CATTS-${{ needs.version.outputs.tag }}-Portable-Windows-x64
          path: CATTS-${{ needs.version.outputs.tag }}-Portable-Windows-x64.zip
          retention-days: 14

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: CATTS-${{ needs.version.outputs.tag }}-Setup-Windows-x64
          path: CATTS-${{ needs.version.outputs.tag }}-Setup-Windows-x64.exe
          retention-days: 14

  # ── Ubuntu 빌드 ──
  build-ubuntu:
    needs: version
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject version
        env:
          VER: ${{ needs.version.outputs.tag }}
        run: |
          NUM=${VER#v}
          sed -i "s/^version = .*/version = \"${NUM}\"/" pyproject.toml
          sed -i "s/^APP_VERSION = .*/APP_VERSION = ${NUM}/" src/main.py

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libsndfile1-dev \
            libgl1-mesa-glx libegl1-mesa libxkbcommon0 libdbus-1-3 \
            libxcb-xinerama0 libxkbcommon-x11-0 libxcb-cursor0 \
            libxcb-icccm4 libxcb-keysyms1 libxcb-shape0 \
            ruby ruby-dev rpm libfuse2
          sudo gem install fpm --no-document

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install PyTorch (CPU)
        run: pip install torch torchaudio --index-url https://download.pytorch.org/whl/cpu

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build with PyInstaller
        working-directory: build
        run: pyinstaller video_transcriber.spec --distpath output/dist --workpath output/build --clean -y
        env:
          WHISPER_MODEL_PATH: ""

      - name: Verify build (smoke test)
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          exe="build/output/dist/VideoTranscriber/VideoTranscriber"
          if [ ! -f "$exe" ]; then
            echo "::error::Build output not found: $exe"
            exit 1
          fi

          chmod +x "$exe"
          exe_size=$(du -sh "$exe" | cut -f1)
          total_size=$(du -sh build/output/dist/VideoTranscriber | cut -f1)
          echo "Binary: ${exe_size}, Total: ${total_size}"

          # selftest 실행
          echo "=== Running selftest ==="
          "$exe" --selftest || true

          # selftest 결과 파일 탐색 (exe 디렉토리 또는 temp)
          result_file="build/output/dist/VideoTranscriber/_selftest.txt"
          if [ ! -f "$result_file" ]; then
            result_file="/tmp/_selftest.txt"
          fi
          if [ -f "$result_file" ]; then
            cat "$result_file"
            if grep -q "RESULT: PASS" "$result_file"; then
              echo "Selftest PASSED"
            else
              echo "::error::Selftest FAILED!"
              exit 1
            fi
          else
            echo "::error::Selftest result file not created!"
            exit 1
          fi

      - name: Create tar.gz (Portable)
        run: |
          cd build/output/dist
          tar czf ../../../CATTS-${{ needs.version.outputs.tag }}-Linux-x86_64.tar.gz VideoTranscriber/

      - name: Prepare Linux packaging resources
        env:
          VER: ${{ needs.version.outputs.tag }}
        run: |
          NUM=${VER#v}
          DIST_DIR="build/output/dist/VideoTranscriber"

          # .desktop 파일 생성
          cat > catts.desktop << 'DESKTOP'
          [Desktop Entry]
          Name=CATTS
          Comment=Video Transcriber
          Exec=/opt/catts/VideoTranscriber
          Icon=catts
          Terminal=false
          Type=Application
          Categories=AudioVideo;Audio;Video;Utility;
          DESKTOP
          # heredoc 들여쓰기 제거
          sed -i 's/^          //' catts.desktop

          # 실행 권한 보장
          chmod +x "${DIST_DIR}/VideoTranscriber"

      - name: Build .deb package
        env:
          VER: ${{ needs.version.outputs.tag }}
        run: |
          NUM=${VER#v}
          fpm -s dir -t deb \
            --name catts \
            --version "${NUM}" \
            --description "CATTS - Video Transcriber" \
            --maintainer "CATTS" \
            --url "https://github.com/taxi-tabby/video-transcriber" \
            --license "MIT" \
            --depends libsndfile1 \
            --depends libgl1 \
            --depends libegl1 \
            --depends libxkbcommon0 \
            --depends libdbus-1-3 \
            --depends libxcb-cursor0 \
            --after-install <(echo '#!/bin/sh
          ln -sf /opt/catts/VideoTranscriber /usr/local/bin/catts
          update-desktop-database /usr/share/applications 2>/dev/null || true
          gtk-update-icon-cache /usr/share/icons/hicolor 2>/dev/null || true') \
            --after-remove <(echo '#!/bin/sh
          rm -f /usr/local/bin/catts
          update-desktop-database /usr/share/applications 2>/dev/null || true') \
            --package "CATTS-${VER}-Linux-x86_64.deb" \
            build/output/dist/VideoTranscriber/=/opt/catts/ \
            catts.desktop=/usr/share/applications/catts.desktop \
            assets/icon/icon-ui-256.png=/usr/share/icons/hicolor/256x256/apps/catts.png

      - name: Build .rpm package
        env:
          VER: ${{ needs.version.outputs.tag }}
        run: |
          NUM=${VER#v}
          fpm -s dir -t rpm \
            --name catts \
            --version "${NUM}" \
            --description "CATTS - Video Transcriber" \
            --maintainer "CATTS" \
            --url "https://github.com/taxi-tabby/video-transcriber" \
            --license "MIT" \
            --depends libsndfile \
            --depends mesa-libGL \
            --depends mesa-libEGL \
            --depends libxkbcommon \
            --depends dbus-libs \
            --depends xcb-util-cursor \
            --after-install <(echo '#!/bin/sh
          ln -sf /opt/catts/VideoTranscriber /usr/local/bin/catts
          update-desktop-database /usr/share/applications 2>/dev/null || true
          gtk-update-icon-cache /usr/share/icons/hicolor 2>/dev/null || true') \
            --after-remove <(echo '#!/bin/sh
          rm -f /usr/local/bin/catts
          update-desktop-database /usr/share/applications 2>/dev/null || true') \
            --package "CATTS-${VER}-Linux-x86_64.rpm" \
            build/output/dist/VideoTranscriber/=/opt/catts/ \
            catts.desktop=/usr/share/applications/catts.desktop \
            assets/icon/icon-ui-256.png=/usr/share/icons/hicolor/256x256/apps/catts.png

      - name: Build .AppImage
        env:
          VER: ${{ needs.version.outputs.tag }}
        run: |
          # appimagetool 다운로드
          wget -q "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage" -O appimagetool
          chmod +x appimagetool

          # AppDir 구조 생성
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps

          # 앱 파일 복사
          cp -r build/output/dist/VideoTranscriber/* AppDir/usr/bin/
          chmod +x AppDir/usr/bin/VideoTranscriber

          # 아이콘 & 데스크톱 파일
          cp assets/icon/icon-ui-256.png AppDir/catts.png
          cp assets/icon/icon-ui-256.png AppDir/usr/share/icons/hicolor/256x256/apps/catts.png
          cp catts.desktop AppDir/catts.desktop
          cp catts.desktop AppDir/usr/share/applications/catts.desktop

          # AppRun 스크립트
          cat > AppDir/AppRun << 'APPRUN'
          #!/bin/bash
          SELF=$(readlink -f "$0")
          HERE=${SELF%/*}
          export LD_LIBRARY_PATH="${HERE}/usr/bin:${LD_LIBRARY_PATH}"
          exec "${HERE}/usr/bin/VideoTranscriber" "$@"
          APPRUN
          sed -i 's/^          //' AppDir/AppRun
          chmod +x AppDir/AppRun

          # AppImage 생성
          ARCH=x86_64 ./appimagetool --no-appstream AppDir \
            "CATTS-${VER}-Linux-x86_64.AppImage"

      - name: Upload tar.gz artifact
        uses: actions/upload-artifact@v4
        with:
          name: CATTS-${{ needs.version.outputs.tag }}-Linux-x86_64-tar
          path: CATTS-${{ needs.version.outputs.tag }}-Linux-x86_64.tar.gz
          retention-days: 14

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: CATTS-${{ needs.version.outputs.tag }}-Linux-x86_64-deb
          path: CATTS-${{ needs.version.outputs.tag }}-Linux-x86_64.deb
          retention-days: 14

      - name: Upload .rpm artifact
        uses: actions/upload-artifact@v4
        with:
          name: CATTS-${{ needs.version.outputs.tag }}-Linux-x86_64-rpm
          path: CATTS-${{ needs.version.outputs.tag }}-Linux-x86_64.rpm
          retention-days: 14

      - name: Upload .AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: CATTS-${{ needs.version.outputs.tag }}-Linux-x86_64-AppImage
          path: CATTS-${{ needs.version.outputs.tag }}-Linux-x86_64.AppImage
          retention-days: 14

  # ── macOS 빌드 ──
  build-macos:
    needs: version
    runs-on: macos-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject version
        env:
          VER: ${{ needs.version.outputs.tag }}
        run: |
          NUM=${VER#v}
          sed -i '' "s/^version = .*/version = \"${NUM}\"/" pyproject.toml
          sed -i '' "s/^APP_VERSION = .*/APP_VERSION = ${NUM}/" src/main.py

      - name: Install system dependencies
        run: brew install libsndfile

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install PyTorch (CPU)
        run: pip install torch torchaudio --index-url https://download.pytorch.org/whl/cpu

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create macOS icon (.icns)
        run: |
          mkdir -p app.iconset
          sips -z 16 16     assets/icon/icon-ui-256.png --out app.iconset/icon_16x16.png
          sips -z 32 32     assets/icon/icon-ui-256.png --out app.iconset/icon_16x16@2x.png
          sips -z 32 32     assets/icon/icon-ui-256.png --out app.iconset/icon_32x32.png
          sips -z 64 64     assets/icon/icon-ui-256.png --out app.iconset/icon_32x32@2x.png
          sips -z 128 128   assets/icon/icon-ui-128.png --out app.iconset/icon_128x128.png
          sips -z 256 256   assets/icon/icon-ui-256.png --out app.iconset/icon_128x128@2x.png
          sips -z 256 256   assets/icon/icon-ui-256.png --out app.iconset/icon_256x256.png
          sips -z 256 256   assets/icon/icon-ui-256.png --out app.iconset/icon_256x256@2x.png
          sips -z 256 256   assets/icon/icon-ui-256.png --out app.iconset/icon_512x512.png
          sips -z 256 256   assets/icon/icon-ui-256.png --out app.iconset/icon_512x512@2x.png
          iconutil -c icns app.iconset -o assets/icon/app.icns

      - name: Build with PyInstaller
        working-directory: build
        run: pyinstaller video_transcriber.spec --distpath output/dist --workpath output/build --clean -y
        env:
          WHISPER_MODEL_PATH: ""
          APP_VERSION: ${{ needs.version.outputs.tag }}

      - name: Verify build (smoke test)
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          exe="build/output/dist/CATTS.app/Contents/MacOS/VideoTranscriber"
          if [ ! -f "$exe" ]; then
            echo "::error::Build output not found: $exe"
            exit 1
          fi

          chmod +x "$exe"
          app_size=$(du -sh build/output/dist/CATTS.app | cut -f1)
          echo "App bundle: ${app_size}"

          # selftest 실행
          echo "=== Running selftest ==="
          "$exe" --selftest || true

          # selftest 결과 파일 탐색
          result_file="build/output/dist/CATTS.app/Contents/MacOS/_selftest.txt"
          if [ ! -f "$result_file" ]; then
            result_file="/tmp/_selftest.txt"
          fi
          if [ -f "$result_file" ]; then
            cat "$result_file"
            if grep -q "RESULT: PASS" "$result_file"; then
              echo "Selftest PASSED"
            else
              echo "::error::Selftest FAILED!"
              exit 1
            fi
          else
            echo "::error::Selftest result file not created!"
            exit 1
          fi

      - name: Create DMG installer
        run: |
          VERSION="${{ needs.version.outputs.tag }}"
          DMG_NAME="CATTS-${VERSION}-macOS-arm64.dmg"

          # 임시 DMG 디렉토리 구성
          mkdir -p dmg_content
          cp -R build/output/dist/CATTS.app dmg_content/
          ln -s /Applications dmg_content/Applications

          # DMG 생성
          hdiutil create -volname "CATTS ${VERSION}" \
            -srcfolder dmg_content \
            -ov -format UDZO \
            "${DMG_NAME}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CATTS-${{ needs.version.outputs.tag }}-macOS-arm64
          path: CATTS-${{ needs.version.outputs.tag }}-macOS-arm64.dmg
          retention-days: 14

  # ── 릴리스 생성 (모든 빌드 완료 후) ──
  release:
    needs: [version, build-windows, build-ubuntu, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | head -20

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: CATTS ${{ needs.version.outputs.tag }}
          files: |
            artifacts/CATTS-${{ needs.version.outputs.tag }}-Portable-Windows-x64/CATTS-${{ needs.version.outputs.tag }}-Portable-Windows-x64.zip
            artifacts/CATTS-${{ needs.version.outputs.tag }}-Setup-Windows-x64/CATTS-${{ needs.version.outputs.tag }}-Setup-Windows-x64.exe
            artifacts/CATTS-${{ needs.version.outputs.tag }}-Linux-x86_64-tar/CATTS-${{ needs.version.outputs.tag }}-Linux-x86_64.tar.gz
            artifacts/CATTS-${{ needs.version.outputs.tag }}-Linux-x86_64-deb/CATTS-${{ needs.version.outputs.tag }}-Linux-x86_64.deb
            artifacts/CATTS-${{ needs.version.outputs.tag }}-Linux-x86_64-rpm/CATTS-${{ needs.version.outputs.tag }}-Linux-x86_64.rpm
            artifacts/CATTS-${{ needs.version.outputs.tag }}-Linux-x86_64-AppImage/CATTS-${{ needs.version.outputs.tag }}-Linux-x86_64.AppImage
            artifacts/CATTS-${{ needs.version.outputs.tag }}-macOS-arm64/CATTS-${{ needs.version.outputs.tag }}-macOS-arm64.dmg
          generate_release_notes: true
