name: Build Windows

on:
  pull_request:
    branches:
      - main
    types: [closed]

permissions:
  contents: write

jobs:
  build:
    if: github.event.pull_request.merged == true
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get next version
        id: version
        shell: bash
        run: |
          latest=$(git tag --list 'v[0-9]*' --sort=-version:refname | head -n1)
          if [ -z "$latest" ]; then
            next=1
          else
            num=${latest#v}
            next=$((num + 1))
          fi
          echo "tag=v${next}" >> "$GITHUB_OUTPUT"
          echo "Next version: v${next}"

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-lock.txt

      - name: Install PyTorch (CPU)
        run: pip install torch torchaudio --index-url https://download.pytorch.org/whl/cpu

      - name: Install dependencies
        run: pip install -r requirements-lock.txt

      - name: Build with PyInstaller
        working-directory: build
        run: pyinstaller video_transcriber.spec --distpath output\dist --workpath output\build --clean -y
        env:
          WHISPER_MODEL_PATH: ""

      - name: Verify build (smoke test)
        shell: pwsh
        run: |
          $exe = "build\output\dist\VideoTranscriber\VideoTranscriber.exe"
          if (-not (Test-Path $exe)) {
            Write-Error "Build output not found: $exe"
            exit 1
          }
          Write-Host "Build output size: $((Get-Item $exe).Length / 1MB) MB"
          Write-Host "Total dist size: $((Get-ChildItem -Recurse build\output\dist\VideoTranscriber | Measure-Object -Property Length -Sum).Sum / 1MB) MB"
          # numpy C-extension 존재 확인
          $npCore = Get-ChildItem -Recurse build\output\dist\VideoTranscriber -Filter "_multiarray_umath*.pyd"
          if ($npCore.Count -eq 0) {
            Write-Error "FATAL: numpy _multiarray_umath.pyd not found in build output!"
            exit 1
          }
          Write-Host "numpy C-extension found: $($npCore.FullName)"

      - name: Create zip archive
        shell: pwsh
        run: Compress-Archive -Path build\output\dist\VideoTranscriber\* -DestinationPath CATTS-Windows-x64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CATTS-Windows-x64
          path: CATTS-Windows-x64.zip
          retention-days: 14

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: CATTS ${{ steps.version.outputs.tag }}
          files: CATTS-Windows-x64.zip
          generate_release_notes: true
