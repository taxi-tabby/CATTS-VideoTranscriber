name: Build Windows

on:
  pull_request:
    branches:
      - main
    types: [closed]

permissions:
  contents: write

jobs:
  build:
    if: github.event.pull_request.merged == true
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get next version
        id: version
        shell: bash
        run: |
          latest=$(git tag --list 'v[0-9]*' --sort=-version:refname | head -n1)
          if [ -z "$latest" ]; then
            next=1
          else
            num=${latest#v}
            next=$((num + 1))
          fi
          echo "tag=v${next}" >> "$GITHUB_OUTPUT"
          echo "Next version: v${next}"

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-lock.txt

      - name: Install PyTorch (CPU)
        run: pip install torch torchaudio --index-url https://download.pytorch.org/whl/cpu

      - name: Install dependencies
        run: pip install -r requirements-lock.txt

      - name: Build with PyInstaller
        working-directory: build
        run: pyinstaller video_transcriber.spec --distpath output\dist --workpath output\build --clean -y
        env:
          WHISPER_MODEL_PATH: ""

      - name: Verify build (smoke test)
        shell: pwsh
        run: |
          $exe = "build\output\dist\VideoTranscriber\VideoTranscriber.exe"
          if (-not (Test-Path $exe)) {
            Write-Error "Build output not found: $exe"
            exit 1
          }
          $exeSize = [math]::Round((Get-Item $exe).Length / 1MB, 1)
          $totalSize = [math]::Round((Get-ChildItem -Recurse build\output\dist\VideoTranscriber | Measure-Object -Property Length -Sum).Sum / 1MB, 1)
          Write-Host "EXE: ${exeSize}MB, Total: ${totalSize}MB"

          # 파일 존재 확인
          $npCore = Get-ChildItem -Recurse build\output\dist\VideoTranscriber\_internal\numpy\_core -Filter "_multiarray_umath*.pyd" -ErrorAction SilentlyContinue
          if (-not $npCore) { Write-Error "numpy _multiarray_umath.pyd not found!"; exit 1 }
          Write-Host "numpy C-ext: $($npCore.Name)"

          $npLibs = "build\output\dist\VideoTranscriber\_internal\numpy.libs"
          if (-not (Test-Path $npLibs)) { Write-Error "numpy.libs/ not found!"; exit 1 }
          Get-ChildItem $npLibs -Filter "*.dll" | ForEach-Object { Write-Host "  $($_.Name)" }

          # 실제 exe 실행 테스트 (--selftest 모드)
          Write-Host "`n=== Running selftest ==="
          $proc = Start-Process -FilePath $exe -ArgumentList "--selftest" -Wait -PassThru -NoNewWindow
          $resultFile = "build\output\dist\VideoTranscriber\_selftest.txt"
          if (Test-Path $resultFile) {
            $content = Get-Content $resultFile -Raw
            Write-Host $content
            if ($content -notmatch "RESULT: PASS") {
              Write-Error "Selftest FAILED!"
              exit 1
            }
            Write-Host "`nSelftest PASSED"
          } else {
            Write-Error "Selftest result file not created! Exit code: $($proc.ExitCode)"
            exit 1
          }

      - name: Create zip archive
        shell: pwsh
        run: Compress-Archive -Path build\output\dist\VideoTranscriber\* -DestinationPath CATTS-Windows-x64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CATTS-Windows-x64
          path: CATTS-Windows-x64.zip
          retention-days: 14

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: CATTS ${{ steps.version.outputs.tag }}
          files: CATTS-Windows-x64.zip
          generate_release_notes: true
